<!doctype html>
<html class="x-admin-sm">
<head>
    <meta charset="UTF-8">
    <title>后台登录-X-admin2.2</title>
    <meta name="renderer" content="webkit|ie-comp|ie-stand">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8,target-densitydpi=low-dpi" />
    <meta http-equiv="Cache-Control" content="no-siteapp" />
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="./css/xadmin.css">
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="./lib/layui/layui.js" charset="utf-8"></script>
</head>
<body class="login-bg">
<div class="login layui-anim layui-anim-up">
    <div class="message">智慧农业管理系统</div>
    <div id="darkbannerwrap"></div>
    <form class="layui-form" id="Form">
        <input name="username" placeholder="用户名" type="text" lay-verify="required" class="layui-input">
        <hr class="hr15">
        <input name="password" lay-verify="required" placeholder="密码" type="password" class="layui-input">
        <hr class="hr15">
        <button lay-submit lay-filter="login" style="width:100%;" class="layui-btn">登录</button>
        <hr class="hr20">
    </form>
</div>

<script>
    layui.use(['form', 'layer'], function(){
        var form = layui.form;
        var layer = layui.layer;

        // 监听表单提交
        form.on('submit(login)', function(data){
            $.ajax({
                url: "/login",
                type: "post",
                data: $("#Form").serialize(),
                success: function(response){
                    console.log("Response from server:", response); // 打印响应数据
                    if(response == "1"){
                        console.log("Login success, redirecting..."); // 调试信息
                        window.location.href = "index.html"; // 跳转到首页
                    } else {
                        console.log("Login failed"); // 调试信息
                        layer.msg('账号或密码错误！', {icon: 2}); // 显示错误提示
                    }
                },
                error: function(){
                    layer.msg('登录失败，请稍后重试！', {icon: 2});
                }
            });
            return false; // 阻止表单跳转
        });
    });
</script>
</body>
</html>
