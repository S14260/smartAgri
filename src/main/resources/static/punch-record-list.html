<script>
    $(function () {
        loadPunchRecords();
    });

    // 查询打卡记录
    function loadPunchRecords() {
        $.ajax({
            url: '/punch', // 后端打卡记录查询接口，按实际修改
            type: 'GET',
            dataType: 'json',
            success: function (data) {
                var htmlstr = "";
                for (var i = 0; i < data.length; i++) {
                    var record = data[i];
                    var statusText = record.status === 1 ? "有效" : "无效";
                    htmlstr += "<tr>" +
                        "<td>" + record.id + "</td>" +
                        "<td>" + record.username + "</td>" +
                        "<td>" + record.plotName + "</td>" +
                        "<td>" + record.punchTime + "</td>" +
                        "<td>" + statusText + "</td>" +
                        "<td>" + (record.remark || "") + "</td>" +
                        "</tr>";
                }
                $("#tbody").html(htmlstr);
            },
            error: function () {
                alert('服务器执行错误！');
            }
        });
    }
</script>
