<!DOCTYPE html>
<html class="x-admin-sm">
<head>
    <meta charset="UTF-8">
    <title>地块列表 - 智慧农业</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8,target-densitydpi=low-dpi"/>
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./css/xadmin.css">
    <script src="./lib/layui/layui.js" charset="utf-8"></script>
    <script type="text/javascript" src="./js/xadmin.js"></script>
    <script src="https://cdn.staticfile.org/jquery/2.1.1/jquery.min.js"></script>

    <!-- Leaflet 样式和脚本 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-image/leaflet-image.js"></script>

    <style>
        .map-dialog {
            display: flex;
            gap: 20px;
            padding: 10px;
            box-sizing: border-box;
        }

        .map-left, .map-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fdfdfd;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        #map {
            flex: 1;
            min-height: 350px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        #result {
            flex: 1;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f7fa;
            border-radius: 8px;
            border: 2px dashed #d0d0d0;
            overflow: hidden;
        }

        #result img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 6px;
            box-shadow: 0 0 8px rgba(0,0,0,0.05);
        }

        #result span {
            color: #999;
            font-size: 15px;
        }

        .capture-btn, .download-btn {
            margin-top: 10px;
            align-self: center;
            background-color: #5FB878;
            color: white;
            transition: all 0.3s ease;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
            padding: 6px 15px;
            border: none;
        }

        .capture-btn:hover, .download-btn:hover {
            background-color: #4aae65;
            transform: scale(1.02);
        }

        .download-btn {
            display: none;
        }
    </style>

</head>

<body>
<div class="x-nav">
    <span class="layui-breadcrumb">
        <a href="">首页</a>
        <a href="">地块管理</a>
        <a><cite>地块列表</cite></a>
    </span>
    <a class="layui-btn layui-btn-sm" style="float:right;margin-top:3px;" onclick="location.reload()" title="刷新">
        <i class="layui-icon layui-icon-refresh"></i>
    </a>
</div>

<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-body">
                    <table class="layui-table">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>面积(/亩)</th>
                            <th>名称</th>
                            <th>上季作物</th>
                            <th>本季作物</th>
                            <th>联系人</th>
                            <th>电话</th>
                            <th>土壤类型</th>
                            <th>灌溉条件</th>
                            <th>土地类型</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    $(function () {
        query();
    });

    function query() {
        $.ajax({
            url: '/student/queryPlot',
            type: 'GET',
            dataType: 'json',
            success: function (data) {
                let htmlstr = "";
                for (let i = 0; i < data.length; i++) {
                    const plots = data[i];
                    htmlstr += `
                        <tr>
                            <td>${plots.id}</td>
                            <td>${plots.area}</td>
                            <td>${plots.name}</td>
                            <td>${plots.lastCrop}</td>
                            <td>${plots.currentCrop}</td>
                            <td>${plots.contactPerson}</td>
                            <td>${plots.phone}</td>
                            <td>${plots.soilType}</td>
                            <td>${plots.irrigationType}</td>
                            <td>${plots.landType}</td>
                            <td><button class='layui-btn layui-btn-xs' onclick='showMap(\`${plots.coordinates}\`)'>获取地块图片</button></td>
                        </tr>`;
                }
                $("#tbody").html(htmlstr);
            },
            error: function () {
                layer.msg('服务器执行错误！', {icon: 2});
            }
        });
    }

    let map;
    let currentImageData = null; // 用于保存当前截图Base64

    function showMap(coordStr) {
        const coord = JSON.parse(coordStr);

        layer.open({
            type: 1,
            area: ['900px', '520px'],
            title: '地图截图预览',
            content: `
                <div class="map-dialog">
                    <div class="map-left">
                        <div id="map"></div>
                        <button class="layui-btn capture-btn" onclick="captureMap()">📸 生成截图</button>
                    </div>
                    <div class="map-right" style="display:flex; flex-direction:column; align-items:center;">
                        <div id="result" style="flex:1; min-height:350px; width:100%; display:flex; align-items:center; justify-content:center; background:#f5f7fa; border-radius:8px; border:2px dashed #d0d0d0; overflow:hidden;">
                            <span>截图将在此处展示</span>
                        </div>
                        <button id="downloadBtn" class="layui-btn capture-btn" style="display:none;" onclick="downloadImage()">⬇️ 下载截图</button>
                    </div>
                </div>
            `,
            success: function () {
                if (map) map.remove();
                map = L.map('map').setView([39, 117], 16);

                L.tileLayer('https://t{s}.tianditu.gov.cn/DataServer?T=img_w&x={x}&y={y}&l={z}&tk=19fc987939ebbcbcb3f0954ab6cf75be', {
                    subdomains: ['0', '1', '2', '3', '4', '5', '6', '7'],
                    maxZoom: 18
                }).addTo(map);

                let shape;
                if (coord.shapeType === 'polygon') {
                    shape = L.polygon(coord.latlngs).addTo(map);
                    map.fitBounds(shape.getBounds());
                } else if (coord.shapeType === 'circle') {
                    shape = L.circle(coord.center, {radius: coord.radius}).addTo(map);
                    map.setView([coord.center.lat, coord.center.lng], 17);
                }
            }
        });
    }

    function captureMap() {
        leafletImage(map, function (err, canvas) {
            if (err) {
                layer.msg('截图失败！', {icon: 2});
                return;
            }
            const img = document.createElement('img');
            currentImageData = canvas.toDataURL('image/png');
            img.src = currentImageData;
            const result = document.getElementById('result');
            result.innerHTML = '';
            result.appendChild(img);

            // 显示下载按钮
            const downloadBtn = document.getElementById('downloadBtn');
            if (downloadBtn) {
                downloadBtn.style.display = 'inline-block';
            }
        });
    }

    function downloadImage() {
        if (!currentImageData) {
            layer.msg('请先生成截图！', {icon: 0});
            return;
        }
        const a = document.createElement('a');
        a.href = currentImageData;
        a.download = 'plot-map.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>
</body>
</html>
