const API_URL = "/admin/plots";
const FLASK_URL = "http://123.56.228.32:8000";

let currentNdviTime = null;

/* ========================
   4. 加载地块
======================== */
async function loadPlots() {
    try {
        const res = await fetch(API_URL, { headers: { token } });
        if (!res.ok) throw new Error("请求失败");
        const plots = await res.json();
        plots.forEach(renderPlot);
        buildPlotList(plots);
    } catch (err) {
        console.error("加载失败：", err);
    }
}

function renderPlot(plot) {
    if (!plot.coordinates) return;
    let geo;
    try { geo = JSON.parse(plot.coordinates); } catch (e) { return; }
    if (geo.shapeType !== "polygon") return;

    const positions = geo.latlngs.map(p => [p.lng, p.lat]).flat();
    const entity = viewer.entities.add({
        name: plot.plotName,
        polygon: {
            hierarchy: Cesium.Cartesian3.fromDegreesArray(positions),
            material: Cesium.Color.TRANSPARENT, outline: false
        },
        description: `<div style="padding:10px;">
            <h3>${plot.plotName}</h3>
            <p><b>作物：</b>${plot.currentCrop}</p>
            <p><b>面积：</b>${plot.area} 亩</p>
            <p><b>联系人：</b>${plot.contactPerson}</p>
            <p><b>电话：</b>${plot.phone}</p>
        </div>`
    });

    const linePositions = [...positions, positions[0], positions[1]];
    const lineEntity = viewer.entities.add({
        polyline: {
            positions: Cesium.Cartesian3.fromDegreesArray(linePositions),
            width: STYLE.lineWidth, material: STYLE.defaultLine, clampToGround: true
        }
    });

    entity.border = lineEntity;
    entity.plotData = plot;
    plotMap.set(plot.id, entity);

    if (!hasFlown) { viewer.flyTo(entity); hasFlown = true; }
}

/* ========================
   5. 点击高亮
======================== */
function initClickHandler() {
    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    handler.setInputAction((click) => {
        const picked = viewer.scene.pick(click.position);
        if (!Cesium.defined(picked) || !picked.id) return;
        const entity = picked.id;
        if (!entity.polygon) return;
        selectEntity(entity);
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
}

function selectEntity(entity) {
    if (selectedEntity && selectedEntity !== entity) resetEntityStyle(selectedEntity);
    highlightEntity(entity);
    selectedEntity = entity;
    viewer.flyTo(entity, { duration: 1 });
}

function highlightEntity(entity) { entity.border.polyline.material = STYLE.highlightLine; }
function resetEntityStyle(entity) { entity.border.polyline.material = STYLE.defaultLine; }

/* ========================
   6. 查询面板
======================== */
function initPanel() {
    const queryBtn = document.getElementById("queryBtn");
    const queryPanel = document.getElementById("queryPanel");
    const ndviBtn = document.getElementById("ndviBtn");
    const ndviPanel = document.getElementById("ndviPanel");
    const queryWrapper = document.getElementById("queryWrapper");
    const ndviWrapper = document.getElementById("ndviWrapper");

    queryBtn.onclick = (e) => { e.stopPropagation(); queryPanel.classList.toggle("hidden"); ndviPanel.classList.add("hidden"); };
    ndviBtn.onclick = (e) => { e.stopPropagation(); ndviPanel.classList.toggle("hidden"); queryPanel.classList.add("hidden"); };
    queryWrapper.onclick = (e) => e.stopPropagation();
    ndviWrapper.onclick = (e) => e.stopPropagation();
    document.addEventListener("click", () => { queryPanel.classList.add("hidden"); ndviPanel.classList.add("hidden"); });
}

function buildPlotList(plots) {
    const container = document.getElementById("plotList");
    container.innerHTML = "";
    plots.forEach(plot => {
        const div = document.createElement("div");
        div.className = "plot-item";
        div.innerText = plot.plotName;
        div.onclick = () => flyToPlot(plot.id);
        container.appendChild(div);
    });
}

function flyToPlot(plotId) { const entity = plotMap.get(plotId); if (entity) selectEntity(entity); }

/* ========================
   7. NDVI 控制
======================== */
function initNdvi() {
    const regionSelect = document.getElementById("regionSelect");
    const timeSelect = document.getElementById("timeSelect");
    const removeNdviBtn = document.getElementById("removeNdviBtn");

    regionSelect.addEventListener("change", async () => {
        const region = regionSelect.value;
        timeSelect.innerHTML = '<option value="" selected disabled>请选择日期</option>';
        currentNdviTime = null;
        try {
            const res = await fetch(`${FLASK_URL}/admin/ndvilist?region=${region}`, { headers: {"token": token} });
            const ndviList = await res.json();
            regionNdviTimeCache[region] = ndviList;
            if (!Array.isArray(ndviList) || ndviList.length === 0) { alert(`${region} 暂无 NDVI 数据`); return; }
            const grouped = {};
            ndviList.forEach(item => { if (!grouped[item.year]) grouped[item.year] = []; grouped[item.year].push(item); });
            Object.keys(grouped).sort().forEach(year => {
                const optgroup = document.createElement("optgroup");
                optgroup.label = year;
                grouped[year].forEach(item => {
                    const key = `${item.year}-${item.date.slice(0,2)}-${item.date.slice(2,4)}`;
                    const option = document.createElement("option");
                    option.value = key; option.textContent = key;
                    optgroup.appendChild(option);
                });
                timeSelect.appendChild(optgroup);
            });
        } catch (err) { console.error("NDVI列表失败", err); }
    });

    timeSelect.addEventListener("change", async () => {
        const region = regionSelect.value;
        const selectedTime = timeSelect.value;
        if (!region || !selectedTime || selectedTime === currentNdviTime) return;
        currentNdviTime = selectedTime;
        const dateForApi = selectedTime.replace(/-(\d{2})-(\d{2})/, "_$1$2");
        removeAllNdviLayers();
        try {
            const resPlots = await fetch(API_URL, { headers: {"token": token} });
            const rawPlots = await resPlots.json();
            const requestData = transformPlotsForNdviCut(rawPlots, dateForApi);
            requestData.region = region;
            const resCut = await fetch(`${FLASK_URL}/admin/ndvicut`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "token": token },
                body: JSON.stringify(requestData)
            });
            const results = await resCut.json();
            if (!results.success || results.success.length === 0) { alert("无NDVI结果"); return; }
            results.success.forEach(item => {
                const bounds = item.bounds;
                const rectangle = Cesium.Rectangle.fromDegrees(bounds[0][1], bounds[0][0], bounds[1][1], bounds[1][0]);
                const layer = viewer.imageryLayers.addImageryProvider(new Cesium.SingleTileImageryProvider({ url: item.png_url, rectangle }));
                ndviLayers.push(layer);
            });
        } catch (err) { console.error("NDVI加载失败", err); }
    });

    removeNdviBtn.addEventListener("click", () => { removeAllNdviLayers(); currentNdviTime = null; timeSelect.value = ""; });
}

function removeAllNdviLayers() { ndviLayers.forEach(layer => viewer.imageryLayers.remove(layer)); ndviLayers = []; }

function transformPlotsForNdviCut(rawPlots, dateStr) {
    const plots = rawPlots.map(item => {
        let polygonObj;
        try { polygonObj = typeof item.coordinates === 'string' ? JSON.parse(item.coordinates) : item.coordinates; } catch (e) { polygonObj = null; }
        return { plotId: item.id, plotname: item.plotName, polygon: polygonObj };
    }).filter(p => p.polygon);
    return { date: dateStr, plots };
}

/* ========================
   8.1 NDVI 对比分析
======================== */
function initCompareNdvi() {
    document.getElementById("compareNdviBtn").addEventListener("click", async () => {
        layui.use(['layer', 'form'], function() {
            const layer = layui.layer;
            const form = layui.form;

            const formHtml = `
            <div class="compare-modal">
                <h3><i class="fa fa-chart-line"></i> NDVI 对比分析</h3>
                <div class="compare-form-group">
                    <label>选择地区</label>
                    <select id="compareRegionSelect">
                        <option value="" selected disabled>请选择地区</option>
                        ${regionList.map(r => `<option value="${r.name}" data-id="${r.id}">${r.name}</option>`).join('')}
                    </select>
                </div>
                <div class="compare-form-group">
                    <label>选择地块</label>
                    <select id="comparePlotSelect" disabled>
                        <option value="" selected disabled>请先选择地区</option>
                    </select>
                </div>
                <div class="compare-form-group">
                    <label>对比时间</label>
                    <div class="compare-time-row">
                        <select id="compareTime1" disabled>
                            <option value="" selected disabled>时间点 1</option>
                        </select>
                        <span class="vs">VS</span>
                        <select id="compareTime2" disabled>
                            <option value="" selected disabled>时间点 2</option>
                        </select>
                    </div>
                </div>
                <button class="compare-btn" id="startCompareBtn" disabled>
                    <i class="fa fa-search"></i> 开始对比分析
                </button>
                <div id="compareResultArea"></div>
            </div>`;

            const modalIndex = layer.open({
                type: 1,
                title: 'NDVI 对比分析',
                area: ['520px', '600px'],
                content: formHtml,
                shade: 0.3
            });

            setTimeout(() => {
                const regionSelect = document.getElementById("compareRegionSelect");
                const plotSelect = document.getElementById("comparePlotSelect");
                const time1Select = document.getElementById("compareTime1");
                const time2Select = document.getElementById("compareTime2");
                const startBtn = document.getElementById("startCompareBtn");
                const resultArea = document.getElementById("compareResultArea");

                // 选择地区后加载地块列表
                regionSelect.addEventListener("change", async () => {
                    const regionName = regionSelect.value;  // 中文名，用于 Java API
                    const regionId = regionSelect.options[regionSelect.selectedIndex].dataset.id;  // 英文标识符，用于 Flask API
                    plotSelect.innerHTML = '<option value="" selected disabled>加载中...</option>';
                    plotSelect.disabled = true;
                    time1Select.innerHTML = '<option value="" selected disabled>时间点 1</option>';
                    time2Select.innerHTML = '<option value="" selected disabled>时间点 2</option>';
                    time1Select.disabled = true;
                    time2Select.disabled = true;
                    startBtn.disabled = true;

                    try {
                        // 获取地块列表（使用中文名）
                        const plots = await getRegionPlots(regionName);
                        plotSelect.innerHTML = '<option value="" selected disabled>请选择地块</option>';
                        plots.forEach(p => {
                            plotSelect.innerHTML += `<option value="${p.id}" data-name="${p.plotName}">${p.plotName}</option>`;
                        });
                        plotSelect.disabled = false;

                        // 加载 NDVI 时间列表（使用英文标识符）
                        const res = await fetch(`${FLASK_URL}/admin/ndvilist?region=${regionId}`, { headers: {"token": token} });
                        const ndviList = await res.json();
                        regionNdviTimeCache[regionId] = ndviList;

                        if (Array.isArray(ndviList) && ndviList.length > 0) {
                            const timeOptions = '<option value="" selected disabled>请选择时间</option>';
                            time1Select.innerHTML = timeOptions;
                            time2Select.innerHTML = timeOptions;

                            const grouped = {};
                            ndviList.forEach(item => {
                                if (!grouped[item.year]) grouped[item.year] = [];
                                grouped[item.year].push(item);
                            });

                            Object.keys(grouped).sort().forEach(year => {
                                const optgroup = `<optgroup label="${year}">`;
                                let options = '';
                                grouped[year].forEach(item => {
                                    const key = `${item.year}-${item.date.slice(0,2)}-${item.date.slice(2,4)}`;
                                    options += `<option value="${key}">${key}</option>`;
                                });
                                time1Select.innerHTML += optgroup + options + '</optgroup>';
                                time2Select.innerHTML += optgroup + options + '</optgroup>';
                            });

                            time1Select.disabled = false;
                            time2Select.disabled = false;
                        }
                    } catch (err) {
                        plotSelect.innerHTML = '<option value="" selected disabled>加载失败</option>';
                        console.error("加载失败", err);
                    }
                });

                // 选择变化时检查按钮状态
                const checkBtnState = () => {
                    startBtn.disabled = !(plotSelect.value && time1Select.value && time2Select.value && time1Select.value !== time2Select.value);
                };

                plotSelect.addEventListener("change", checkBtnState);
                time1Select.addEventListener("change", checkBtnState);
                time2Select.addEventListener("change", checkBtnState);

                // 开始对比分析
                startBtn.addEventListener("click", async () => {
                    const regionName = regionSelect.value;  // 中文名
                    const regionId = regionSelect.options[regionSelect.selectedIndex].dataset.id;  // 英文标识符
                    const plotId = plotSelect.value;
                    const plotName = plotSelect.options[plotSelect.selectedIndex].dataset.name;
                    const time1 = time1Select.value;
                    const time2 = time2Select.value;

                    if (time1 === time2) {
                        layer.msg('请选择不同的时间点', {icon: 0});
                        return;
                    }

                    startBtn.disabled = true;
                    startBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 分析中...';
                    resultArea.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">正在获取数据...</div>';

                    try {
                        // 获取两个时间点的 NDVI 数据
                        const date1ForApi = time1.replace(/-(\d{2})-(\d{2})/, "_$1$2");
                        const date2ForApi = time2.replace(/-(\d{2})-(\d{2})/, "_$1$2");

                        // 获取地块信息（使用中文名）
                        const plots = await getRegionPlots(regionName);
                        const targetPlot = plots.find(p => String(p.id) === String(plotId));
                        if (!targetPlot) throw new Error("未找到地块");

                        // 构造请求数据（使用英文标识符）
                        const requestData1 = {
                            date: date1ForApi,
                            region: regionId,
                            plots: [{ plotId: targetPlot.id, plotname: targetPlot.plotName, polygon: JSON.parse(targetPlot.coordinates) }]
                        };
                        const requestData2 = {
                            date: date2ForApi,
                            region: regionId,
                            plots: [{ plotId: targetPlot.id, plotname: targetPlot.plotName, polygon: JSON.parse(targetPlot.coordinates) }]
                        };

                        // 并行获取两个时间点的数据
                        const [res1, res2] = await Promise.all([
                            fetch(`${FLASK_URL}/admin/ndvicut`, {
                                method: "POST",
                                headers: { "Content-Type": "application/json", "token": token },
                                body: JSON.stringify(requestData1)
                            }),
                            fetch(`${FLASK_URL}/admin/ndvicut`, {
                                method: "POST",
                                headers: { "Content-Type": "application/json", "token": token },
                                body: JSON.stringify(requestData2)
                            })
                        ]);

                        const data1 = await res1.json();
                        const data2 = await res2.json();

                        // 计算 NDVI 统计（模拟数据，实际需要后端返回）
                        // 这里用随机数演示，真实场景需要后端返回均值、最大值、最小值等
                        const ndvi1 = simulateNdviStats(data1, time1);
                        const ndvi2 = simulateNdviStats(data2, time2);

                        // 生成对比结果
                        renderCompareResult(resultArea, plotName, ndvi1, ndvi2);

                    } catch (err) {
                        resultArea.innerHTML = `<div style="color:#F56C6C;padding:10px;">分析失败: ${err.message}</div>`;
                    } finally {
                        startBtn.disabled = false;
                        startBtn.innerHTML = '<i class="fa fa-search"></i> 开始对比分析';
                    }
                });
            }, 100);
        });
    });
}

                </div>

                            <div style="text-align:center;color:#999;font-size:13px;">请先选择地区</div>
                        </div>

            const modalIndex = layer.open({
                type: 1, title: '异常检测参数选择', area: ['520px', '450px'],
                content: formHtml, shade: 0.3, shadeClose: false
            });

            setTimeout(() => {

                const endDateEl = document.getElementById("endDate");

                const confirmDetectBtn = document.getElementById("confirmDetectBtn");

                laydate.render({ elem: startDateEl, type: 'date', value: '2025-06-01', done: updateBtn });
                laydate.render({ elem: endDateEl, type: 'date', value: '2025-10-01', done: updateBtn });
                form.render('checkbox');

                detectRegionSelect.addEventListener('change', async function() {
                    const selectedRegion = this.value;
                    if (!selectedRegion) return;
                    plotCheckboxContainer.innerHTML = '<div style="text-align:center;color:#999;">加载中...</div>';
                    plotCheckAll.style.display = 'none';
                    confirmDetectBtn.disabled = true;

                    try {
                        const plots = await getRegionPlots(selectedRegion);
                        if (plots.length === 0) {
                            plotCheckboxContainer.innerHTML = '<div style="text-align:center;color:#F56C6C;">该地区无地块数据</div>';
                        } else {

                            ).join('');
                            plotCheckAll.style.display = 'inline-block';
                            setTimeout(() => form.render('checkbox'), 50);
                        }
                    } catch (err) {
                        plotCheckboxContainer.innerHTML = '<div style="text-align:center;color:#F56C6C;">加载失败</div>';
                    }
                });

                plotCheckAll.addEventListener('click', function() {
                    const cbs = plotCheckboxContainer.querySelectorAll('input[name="plotIds"]');
                    let allChecked = true;
                    cbs.forEach(cb => { if (!cb.checked) allChecked = false; });
                    cbs.forEach(cb => { cb.checked = !allChecked; });
                    form.render('checkbox');
                    updateBtn();
                });

                form.on('checkbox(plotIds)', updateBtn);

                function updateBtn() {
                    const checked = document.querySelectorAll('input[name="plotIds"]:checked').length;
                    confirmDetectBtn.disabled = !(checked >= 1 && startDateEl.value && endDateEl.value);
                }

                document.getElementById("cancelDetectBtn").onclick = () => layer.close(modalIndex);

                    document.querySelectorAll('input[name="plotIds"]:checked').forEach(cb => selectedPlotIds.push(cb.value));

                    if (selectedPlotIds.length < 1) { layer.msg('必须选择至少1个地块', {icon: 2}); this.disabled = false; return; }

                    const selectedPlots = await getRegionPlots(selectedRegion);
                    const targetPlots = selectedPlots.filter(p => selectedPlotIds.includes(String(p.id)));
                    const requestData = targetPlots.map(plot => ({
                        plot_id: `${plot.id}_${plot.plotName}`,
                        start_date: startDateEl.value,
                        end_date: endDateEl.value,
                        ndvi_folder: ndviFolderMap[selectedRegion] || "./static/ndvi_clips/guyuan/admin"
                    }));

                    layer.close(modalIndex);
                    layui.layer.msg(`正在对【${selectedRegion}】的 ${selectedPlotIds.length} 个地块执行异常检测...`, {icon: 16, shade: 0.3, time: 0});

                    try {
                        clearAnomalyEntities();
                        const res = await fetch(`${FLASK_URL}/xuntian/run`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json", "token": token || "" },
                            body: JSON.stringify(requestData)
                        });
                        if (!res.ok) throw new Error(`状态码：${res.status}`);
                        const responseData = await res.json();
                        const timestamp = responseData.timestamp;
                        if (!timestamp) throw new Error("未返回时间戳");

                        const pollTimer = setInterval(async () => {
                            try {
                                const statusRes = await fetch(`${FLASK_URL}/xuntian/status?timestamp=${timestamp}`, { headers: { "token": token || "" } });
                                if (!statusRes.ok) return;
                                const statusData = await statusRes.json();

                                if (statusData.status === "completed") {
                                    clearInterval(pollTimer);
                                    layui.layer.closeAll();

                                    anomalyResultPath = statusData.result_url;
                                    if (!anomalyResultPath) { layui.layer.msg('已完成但未返回结果路径', {icon: 0}); return; }

                                    const reportRes = await fetch(`${anomalyResultPath}/巡田最终工单_${timestamp}.json`, { headers: { "token": token || "" } });
                                    const anomalyReport = await reportRes.json();

                                    renderAnomalyResults(anomalyReport, anomalyResultPath);
                                    showAnomalyResultModal(anomalyReport, anomalyResultPath);
                                    layui.layer.msg(`异常检测完成，共识别 ${(anomalyReport.anomaly_subregions || []).length} 个异常子区域`, {icon: 1});
                                }
                            } catch (e) { console.warn("轮询异常：", e); }
                        }, 3000);
                    } catch (err) {
                        layui.layer.closeAll();
                        layui.layer.msg('异常检测失败：' + err.message, {icon: 2});
                    } finally { this.disabled = false; }
                };
            }, 100);
        });
    });
}

async function getRegionPlots(region) {
    if (regionPlotCache[region]) return regionPlotCache[region];
    const res = await fetch(`${API_URL}?region=${encodeURIComponent(region)}`, { headers: { token } });
    const plots = await res.json();
    regionPlotCache[region] = plots;
    return plots;
}

function clearAnomalyEntities() {
    abnormalEntities.forEach(e => viewer.entities.remove(e));
    abnormalEntities = [];
}

/* ========================
   10. 渲染异常结果 (Cesium)
======================== */
function renderAnomalyResults(anomalyReport, resultPath) {
    clearAnomalyEntities();
    const anomalySubregions = anomalyReport.anomaly_subregions || [];
    if (!Array.isArray(anomalySubregions) || anomalySubregions.length === 0) return;

    anomalySubregions.forEach(item => {
        const lat = item.centroid?.[0];
        const lng = item.centroid?.[1];
        if (!lat || !lng) return;

        let markerColor = '#F56C6C';
        if (item.ndvi_grade_label === '中度干旱') markerColor = '#E6A23C';
        if (item.ndvi_grade_label === '轻度干旱（预警）') markerColor = '#409EFF';
        if (item.ndvi_grade_label === '病虫害/长势异常') markerColor = '#9C27B0';
        if (item.ndvi_grade_label === '已收割/无植被') markerColor = '#67C23A';
        if (item.anomaly_category === '积水/水渍') markerColor = '#8ea4a4';

        const entity = viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(lng, lat),
            billboard: {
                image: createCircleCanvas(markerColor, 14),
                width: 14, height: 14,
                verticalOrigin: Cesium.VerticalOrigin.CENTER,
                heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
            },
            label: {
                text: item.plot_name || '',
                font: '11px sans-serif',
                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                outlineWidth: 2,
                verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                pixelOffset: new Cesium.Cartesian2(0, -10),
                heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                showBackground: true,
                backgroundColor: Cesium.Color.fromCssColorString('rgba(0,0,0,0.6)')
            },
            description: `<div style="font-size:13px;line-height:1.6;">
                <b>地块名称:</b> ${item.plot_name || '未知'}<br>
                <b>子区域ID:</b> ${item.subregion_id || ''}<br>
                <b>检测日期:</b> ${item.date || '未知'}<br>
                <b>异常等级:</b> <span style="color:${markerColor};">${item.ndvi_grade_label || '未知'}</span><br>
                <b>异常类型:</b> ${item.anomaly_category || '未知'}<br>
                <b>NDVI均值:</b> ${item.mean_ndvi || 0}<br>
                <b>面积:</b> ${(item.area_m2 / 666.67).toFixed(2)} 亩<br>
                <b>优先级:</b> ${item.priority || 0}<br>
                ${item.plot_id && item.date ? `<button onclick="viewAnomalyImage('${resultPath}/visualReports/subregion_anomaly_map_${item.plot_id}_${item.date}.png','${item.plot_name || ''}')" style="margin-top:6px;padding:4px 10px;background:#1E88E5;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;">查看异常图</button>` : ''}
            </div>`,
            anomalyData: item
        });
        abnormalEntities.push(entity);
    });

    // 定位到异常区域
    if (abnormalEntities.length > 0) {
        const positions = abnormalEntities.map(e => e.position.getValue(Cesium.JulianDate.now())).filter(Boolean);
        const boundingSphere = Cesium.BoundingSphere.fromPoints(positions);
        viewer.camera.flyToBoundingSphere(boundingSphere, { duration: 1.5, offset: new Cesium.HeadingPitchRange(0, -0.5, 0) });
    }
}

function createCircleCanvas(color, size) {
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.beginPath();
    ctx.arc(size/2, size/2, size/2 - 1, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    return canvas.toDataURL();
}

                const stats = anomalyReport.ndvi_grade_stats || {};

                    { name: '重度干旱', value: stats['重度干旱'] || 0 },
                    { name: '中度干旱', value: stats['中度干旱'] || 0 },
                    { name: '轻度干旱（预警）', value: stats['轻度干旱（预警）'] || 0 },
                    { name: '病虫害/长势异常', value: stats['病虫害/长势异常'] || 0 },
                    { name: '积水/水渍', value: stats['积水/水渍'] || 0 },
                    { name: '已收割/无植被', value: stats['已收割/无植被'] || 0 }
                ].filter(i => i.value > 0);
                myChart.setOption({
                    tooltip: { trigger: 'item' },
                    legend: { orient: 'vertical', right: 30, top: 'middle', textStyle: { fontSize: 12 } },
                    series: [{
                        name: '异常等级分布', type: 'pie', radius: ['40%', '70%'], data: chartData,
                        label: { fontSize: 12, formatter: '{b}: {c} ({d}%)' },
                        itemStyle: { color: function(p) {
                            const m = {'重度干旱':'#F56C6C','中度干旱':'#E6A23C','轻度干旱（预警）':'#409EFF','病虫害/长势异常':'#9C27B0','已收割/无植被':'#67C23A','积水/水渍':'#8ea4a4'};
                            return m[p.name] || '#888';
                        }}
                    }]
                });
                window.addEventListener('resize', () => myChart.resize());
            }

            // 列表筛选
            const searchInput = document.getElementById('anomalySearchInput');
            const typeFilter = document.getElementById('anomalyTypeFilter');
            const listItems = document.querySelectorAll('.anomaly-subregion-item');

            function filterList() {
                const key = searchInput.value.toLowerCase().trim();
                const type = typeFilter.value;
                listItems.forEach(item => {
                    const plot = (item.dataset.plot || '').toLowerCase();
                    const atype = item.dataset.type || '';
                    item.style.display = ((!key || plot.includes(key) || atype.toLowerCase().includes(key)) && (!type || atype === type)) ? 'block' : 'none';
                });
            }
            searchInput.addEventListener('input', filterList);
            typeFilter.addEventListener('change', filterList);

            // 列表项点击定位
            listItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('view-img-btn') || e.target.classList.contains('ai-explain-btn')) return;
                    const idx = item.getAttribute('data-index');
                    const sub = anomalyReport.anomaly_subregions[idx];
                    if (sub?.centroid) {
                        viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(sub.centroid[1], sub.centroid[0], 500), duration: 1.5 });
                    }
                });
            });

            // 查看可视化图
            document.querySelectorAll('.view-img-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    viewAnomalyImage(btn.getAttribute('data-img-path'), '异常可视化图');
                });
            });

            // AI 解释按钮
            document.querySelectorAll('.ai-explain-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = btn.getAttribute('data-index');
                    const sub = anomalyReport.anomaly_subregions[idx];
                    if (sub) callAiExplain(sub);
                });
            });
        }, 300);
    });
}

function initRoutePlanning() {
    document.getElementById("generatePath").addEventListener("click", async () => {
        if (!currentHistoryReport) { layui.layer.msg('请先加载一个历史工单', {icon: 0}); return; }
        if (currentHistoryPoints.length < 2) { layui.layer.msg('异常点不足（至少需要2个）', {icon: 0}); return; }

        let report_path = '';
        if (currentHistoryReport?.report_info?.report_json_path) {
            report_path = currentHistoryReport.report_info.report_json_path;
            const basePath = window.currentReportBasePath || '';
            const timeMatch = basePath.match(/reports_(\d{8}_\d{6})/);
            if (timeMatch && timeMatch[1]) report_path = report_path.replace(/巡田最终工单_\d+\.json/, `巡田最终工单_${timeMatch[1]}.json`);
        } else if (window.currentReportBasePath) {
            const timeMatch = window.currentReportBasePath.match(/reports_(\d{8}_\d{6})/);
            const targetTime = timeMatch ? timeMatch[1] : new Date().toISOString().replace(/[-:\.T]/g, '').slice(0, 14);
            report_path = `${window.currentReportBasePath}/巡田最终工单_${targetTime}.json`;
        } else { layui.layer.msg('无法获取工单路径', {icon: 0}); return; }

        const btn = document.getElementById("generatePath");
        const originText = btn.innerHTML;
        btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 生成中...';
        btn.disabled = true;

        try {
            layui.layer.msg('正在生成巡田路径...', {icon: 16, shade: 0.3, time: 0});
            const res = await fetch(`${FLASK_URL}/xuntian/patrol/plan`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "token": token || "" },
                body: JSON.stringify({ report_path, enable_2opt: true })
            });
            const responseData = await res.json();
            if (!res.ok || responseData.status !== "success") throw new Error(responseData.message || "路径规划失败");

            clearPatrolPath();

            const geojsonUrl = responseData.data.geojson;
            const routeGeoJSON = await (await fetch(geojsonUrl)).json();
            const coords = routeGeoJSON.features[0].geometry.coordinates;
            currentRouteCoords = coords;

            const positions = coords.map(c => Cesium.Cartesian3.fromDegrees(c[0], c[1]));
            const plotCount = responseData.data.plot_count || 0;
            const pointCount = responseData.data.point_count || 0;
            const routeLength = (responseData.data.route_length_m / 1000).toFixed(2);
            const visualizationUrl = encodeURI(responseData.data.visualization);
            const geojsonPath = encodeURI(geojsonUrl);
            const evaluationUrl = encodeURI(responseData.data.evaluation);

            patrolPathEntity = viewer.entities.add({
                polyline: {
                    positions: positions, width: 4,
                    material: new Cesium.PolylineDashMaterialProperty({ color: Cesium.Color.fromCssColorString('#1E88E5'), dashLength: 16 }),
                    clampToGround: true
                },
                description: `<div style="font-size:13px;line-height:1.8;">
                    <b>巡田路径规划结果</b><br>
                    <b>地块数量：</b>${plotCount}<br>
                    <b>异常点数：</b>${pointCount}<br>
                    <b>路径总长：</b>${routeLength} 公里<br>
                    <b>优化算法：</b>2-opt<br>
                    <button onclick="viewPathVisual('${visualizationUrl}')" style="padding:4px 8px;background:#1E88E5;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:12px;margin-top:4px;">查看路径图</button>
                    <button onclick="downloadPathGeoJSON('${geojsonPath}')" style="padding:4px 8px;background:#67C23A;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:12px;margin-left:4px;">下载GeoJSON</button>
                    <button onclick="showEvaluationModal('${evaluationUrl}')" style="padding:4px 8px;background:#E6A23C;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:12px;margin-left:4px;">查看评估</button>
                </div>`
            });

            // 起止标记
            [0, coords.length - 1].forEach(idx => {
                const c = coords[idx];
                const isStart = idx === 0;
                const label = isStart ? '起' : '终';
                const bg = isStart ? '#2ECC71' : '#E74C3C';
                const entity = viewer.entities.add({
                    position: Cesium.Cartesian3.fromDegrees(c[0], c[1]),
                    billboard: {
                        image: createLabelCircle(label, bg),
                        width: 26, height: 26,
                        heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
                    },
                    label: {
                        text: isStart ? '路径起点' : '路径终点',
                        font: '12px sans-serif',
                        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                        pixelOffset: new Cesium.Cartesian2(0, -16),
                        heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
                    }
                });
                patrolPointEntities.push(entity);
            });

            // 定位到路径
            const boundingSphere = Cesium.BoundingSphere.fromPoints(positions);
            viewer.camera.flyToBoundingSphere(boundingSphere, { duration: 1.5, offset: new Cesium.HeadingPitchRange(0, -0.5, 0) });

            layui.layer.closeAll();
            layui.layer.msg(`巡田路径生成完成（${routeLength} 公里）`, {icon: 1});
        } catch (err) {
            layui.layer.closeAll();
            layui.layer.msg('路径生成失败：' + err.message, {icon: 2});
        } finally {
            btn.innerHTML = originText;
            btn.disabled = false;
        }
    });
}

function createLabelCircle(text, bgColor) {
    const canvas = document.createElement('canvas');
    canvas.width = 26; canvas.height = 26;
    const ctx = canvas.getContext('2d');
    ctx.beginPath();
    ctx.arc(13, 13, 12, 0, Math.PI * 2);
    ctx.fillStyle = bgColor;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 13, 13);
    return canvas.toDataURL();
}

function clearPatrolPath() {
    if (patrolPathEntity) { viewer.entities.remove(patrolPathEntity); patrolPathEntity = null; }
    patrolPointEntities.forEach(e => viewer.entities.remove(e));
    patrolPointEntities = [];
    currentRouteCoords = null;
}

/* ========================
   16. AI Chat
======================== */
function initAiChat() {
    const toggle = document.getElementById("aiChatToggle");
    const panel = document.getElementById("aiChatPanel");
    const closeBtn = document.getElementById("aiChatClose");
    const sendBtn = document.getElementById("aiChatSend");
    const input = document.getElementById("aiChatInput");
    const messages = document.getElementById("aiChatMessages");

    let chatSessionId = 'session_' + Date.now();

    if (typeof marked !== 'undefined') { marked.setOptions({ breaks: true, gfm: true }); }

    function renderMarkdown(text) {
        if (typeof marked === 'undefined') return text;
        var clean = text.replace(/\n{2,}/g, '\n\n');
        return marked.parse(clean);
    }

    function fixLinks(container) {
        container.querySelectorAll('a').forEach(function(a) {
            a.setAttribute('target', '_blank');
            a.setAttribute('rel', 'noopener noreferrer');
        });
    }

    toggle.onclick = () => {
        panel.classList.toggle("hidden");
        toggle.style.animation = panel.classList.contains('hidden') ? '' : 'none';
    };
    closeBtn.onclick = () => panel.classList.add("hidden");

    const fsBtn = document.getElementById("aiChatFullscreen");
    fsBtn.onclick = () => {
        panel.classList.toggle('fullscreen');
        fsBtn.querySelector('i').className = panel.classList.contains('fullscreen') ? 'fa fa-compress' : 'fa fa-expand';
    };

    sendBtn.onclick = () => sendChatMessage();
    input.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChatMessage(); } });

    async function sendChatMessage() {
        const msg = input.value.trim();
        if (!msg) return;
        input.value = '';

        appendMessage('user', msg);
        const responseDiv = appendMessage('assistant', '', true);

        try {
            const res = await fetch('/admin/ai/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'token': token },
                body: JSON.stringify({ sessionId: chatSessionId, message: msg })
            });

            if (!res.ok) {
                const errText = await res.text();
                responseDiv.textContent = '请求失败 (' + res.status + '): ' + errText;
                responseDiv.classList.remove('streaming-cursor');
                return;
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let accumulatedMarkdown = '';
            let chainPanel = null, chainBody = null, currentStepDiv = null;
            let toolCallCounter = 0;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();

                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed.startsWith('data:')) continue;
                    try {
                        const data = JSON.parse(trimmed.substring(trimmed.indexOf(':') + 1));
                        if (data.type === 'step') {
                            if (!chainPanel) {
                                chainPanel = document.createElement('div');
                                chainPanel.className = 'chain-panel';
                                const header = document.createElement('div');
                                header.className = 'chain-header';
                                header.innerHTML = '<span class="arrow">&#9660;</span> Agent 过程';
                                header.onclick = () => {
                                    header.classList.toggle('collapsed');
                                    chainBody.classList.toggle('hidden');
                                };
                                chainBody = document.createElement('div');
                                chainBody.className = 'chain-body';
                                chainPanel.appendChild(header);
                                chainPanel.appendChild(chainBody);
                                messages.insertBefore(chainPanel, responseDiv.parentElement);
                            }
                            currentStepDiv = document.createElement('div');
                            currentStepDiv.className = 'chain-step';
                            currentStepDiv.innerHTML = `<div class="chain-step-label">步骤 ${data.step}</div>`;
                            chainBody.appendChild(currentStepDiv);
                            toolCallCounter = 0;
                            messages.scrollTop = messages.scrollHeight;
                        } else if (data.type === 'thought') {
                            if (currentStepDiv) {
                                const thoughtDiv = document.createElement('div');
                                thoughtDiv.className = 'chain-thought';
                                thoughtDiv.textContent = data.content || '';
                                currentStepDiv.appendChild(thoughtDiv);
                                // 清空回答气泡中的思考内容（这些内容是中间推理，不是最终回答）
                                accumulatedMarkdown = '';
                                responseDiv.innerHTML = '';
                                messages.scrollTop = messages.scrollHeight;
                            }
                        } else if (data.type === 'token') {
                            accumulatedMarkdown += data.content;
                            if (typeof marked !== 'undefined') {
                                responseDiv.innerHTML = renderMarkdown(accumulatedMarkdown);
                                fixLinks(responseDiv);
                            } else {
                                responseDiv.textContent = accumulatedMarkdown;
                            }
                            messages.scrollTop = messages.scrollHeight;
                        } else if (data.type === 'tool_start') {
                            if (currentStepDiv) {
                                toolCallCounter++;
                                const actionDiv = document.createElement('div');
                                actionDiv.className = 'chain-action';
                                actionDiv.innerHTML = `<span class="spinner">&#8635;</span> ${data.tool_name || ''}`;
                                actionDiv.id = 'action-' + toolCallCounter;
                                actionDiv.dataset.toolName = data.tool_name || '';
                                currentStepDiv.appendChild(actionDiv);
                            }
                            messages.scrollTop = messages.scrollHeight;
                        } else if (data.type === 'tool_result') {
                            if (currentStepDiv) {
                                // 查找当前步骤中最后一个匹配的 action 元素
                                const actionEls = currentStepDiv.querySelectorAll('.chain-action');
                                let actionEl = null;
                                for (let i = actionEls.length - 1; i >= 0; i--) {
                                    if (actionEls[i].dataset.toolName === data.tool_name && actionEls[i].querySelector('.spinner')) {
                                        actionEl = actionEls[i];
                                        break;
                                    }
                                }
                                if (actionEl) {
                                    const spinner = actionEl.querySelector('.spinner');
                                    if (spinner) spinner.remove();
                                }
                                if (data.result_preview) {
                                    const obsDiv = document.createElement('div');
                                    obsDiv.className = 'chain-observation';
                                    obsDiv.textContent = data.result_preview;
                                    currentStepDiv.appendChild(obsDiv);
                                }
                            }
                            messages.scrollTop = messages.scrollHeight;
                        } else if (data.type === 'done') {
                            responseDiv.classList.remove('streaming-cursor');
                            if (chainPanel && chainBody) {
                                setTimeout(() => {
                                    const header = chainPanel.querySelector('.chain-header');
                                    if (header) header.classList.add('collapsed');
                                    chainBody.classList.add('hidden');
                                }, 3000);
                            }
                        }
                    } catch (e) { console.warn('SSE parse error:', e, trimmed); }
                }
            }
            responseDiv.classList.remove('streaming-cursor');
        } catch (err) {
            responseDiv.textContent = '错误: ' + err.message;
            responseDiv.classList.remove('streaming-cursor');
        }
        messages.scrollTop = messages.scrollHeight;
    }

    function appendMessage(role, content, isStreaming) {
        const div = document.createElement('div');
        div.className = `chat-msg ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'chat-bubble';
        if (isStreaming) {
            bubble.classList.add('streaming-cursor');
        } else {
            if (typeof marked !== 'undefined' && role === 'assistant') {
                bubble.innerHTML = renderMarkdown(content);
                fixLinks(bubble);
            } else {
                bubble.textContent = content;
            }
        }
        div.appendChild(bubble);
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return bubble;
    }
}

/* ========================
   16. 工具函数
======================== */
function showCustomMsg(text, duration) {
    layui.layer.msg(text, { icon: 0, time: duration || 3000 });
}
</script>
