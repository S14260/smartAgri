<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <title>地块绘制</title>

    <!-- Leaflet 和 Draw 样式 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

    <!-- Layui 样式 -->
    <link rel="stylesheet" href="https://cdn.staticfile.org/layui/2.8.18/css/layui.css"/>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f5f5f5;
            overflow: hidden;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body > .layui-container {
            width: 100vw;
            max-width: 100vw;
            padding: 0;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .layui-card {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            margin: 0;
            border: none;
            box-shadow: none;
        }

        .layui-form {
            flex: 0 0 auto;
            padding: 10px 16px;
            background: #f8f8f8;
            border-bottom: 1px solid #e6e6e6;
            z-index: 10;
        }

        .layui-card-body {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow: hidden;
        }

        #map {
            flex: 1 1 auto;
            width: 100%;
            height: calc(100vh - 72px);
            min-height: 0;
            min-width: 0;
            position: relative;
            z-index: 1;
        }

        #drawControls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: #f0f0f0;
            border-top: 1px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-wrap: nowrap;
            pointer-events: auto;
        }

        #drawTip {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #333;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 14px;
            z-index: 9999;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .layui-form .layui-btn {
            margin-left: 6px;
        }

        /*整个NDVI 时间轴控件的外层容器*/
        #ndviSliderWrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #f8f9fa;
            border-top: 1px solid #ccc;
            padding: 15px 30px;
            display: none;
            z-index: 9999;
            font-size: 15px;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.08);
        }
        /*整个滑块的轨道的样式*/
        #ndviSlider {
            -webkit-appearance: none;
            width: 300px;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, #4caf50, #2196f3);
            outline: none;
            transition: background 0.3s ease;
        }
        /*小圆点样式*/
        #ndviSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #2196f3;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #ndviSlider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        /*Firefox小圆点样式*/
        #ndviSlider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #2196f3;
            cursor: pointer;
        }
        /*2024-08-18文字样式*/
        #ndviTimeLabel {
            font-weight: bold;
            font-size: 14px;
            margin-left: 12px;
            color: #2c3e50;
        }
    </style>
</head>
<body>
<div class="layui-container">
    <div class="layui-card">
        <div class="layui-card-body">
            <div class="layui-form layui-row layui-col-space10" style="position: sticky; top: 0; background: #fff; z-index: 10; border-bottom: 1px solid #eee; margin: 0;">
                <div class="layui-col-md4">
                    <input type="text" id="searchInput" placeholder="请输入地名" class="layui-input">
                </div>
                <div class="layui-col-md2">
                    <button class="layui-btn layui-btn-normal" id="searchBtn">搜索</button>
                </div>
                <div class="layui-col-md6 layui-text-right">
                    <button class="layui-btn layui-btn-warm" id="queryPlot">查询地块</button>
                    <button class="layui-btn layui-btn-red" id="startDrawBtn">开始圈地</button>
                    <button class="layui-btn layui-btn-blue" id="exportShpBtn">导出图形</button>
                    <!-- 显示/隐藏时间轴按钮 -->
                    <button id="toggleSliderBtn" class="layui-btn layui-btn-normal layui-btn-sm">切换NDVI时间轴</button>

                </div>
            </div>

            <div id="map">
                <div id="drawControls">
                    <button id="btn-start" class="layui-btn layui-btn-danger" style="margin: 0 10px;">开始绘制</button>
                    <button id="btn-finish" class="layui-btn layui-btn-normal" style="margin: 0 10px;">完成绘制</button>
                    <button id="btn-undo" class="layui-btn layui-btn-danger" style="margin: 0 10px;">撤回</button>
                    <button id="btn-cancel" class="layui-btn" style="margin: 0 10px;">取消绘制</button>
                </div>
                <div id="drawTip">已进入圈地模式，请点击“开始绘图”按钮</div>
                <!-- NDVI 时间轴滑块 -->
                <div id="ndviSliderWrapper" style="display:none; margin-top:10px;">
                    <label for="ndviSlider">时间：</label>
                    <input id="ndviSlider" type="range" min="0" step="1" />
                    <span id="ndviTimeLabel"></span>
                </div>

            </div>
        </div>
    </div>
</div>



<!-- Leaflet 与插件 -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
<!--热力图-->
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<!--Geotiff-->
<script src="https://unpkg.com/georaster"></script>
<script src="https://unpkg.com/georaster-layer-for-leaflet"></script>


<!-- Layui -->
<script src="https://cdn.staticfile.org/layui/2.8.18/layui.js"></script>


<!-- 自定义逻辑 -->
<script src="js/app.js"></script>

<script>
    // 监听窗口大小变化，刷新地图大小
    window.addEventListener('resize', () => {
        if (window.map && typeof window.map.invalidateSize === "function") {
            window.map.invalidateSize();
        }
    });

    // 页面加载完成后延迟刷新地图大小
    window.onload = () => {
        setTimeout(() => {
            if (window.map && typeof window.map.invalidateSize === "function") {
                window.map.invalidateSize();
            }
        }, 300);
    }
</script>

<!-- Leaflet Draw 中文配置（覆盖默认英文） -->
<script>
    L.drawLocal = {
        draw: {
            toolbar: {
                actions: {
                    title: '取消绘制',
                    text: '取消'
                },
                finish: {
                    title: '完成绘制',
                    text: '完成'
                },
                undo: {
                    title: '删除最后一个点',
                    text: '删除最后一个点'
                },
                buttons: {
                    polyline: '绘制折线',
                    polygon: '绘制多边形',
                    rectangle: '绘制矩形',
                    circle: '绘制圆形',
                    marker: '绘制标记',
                    circlemarker: '绘制圆点标记'
                }
            },
            handlers: {
                circle: {
                    tooltip: {
                        start: '点击并拖动绘制圆形'
                    },
                    radius: '半径'
                },
                circlemarker: {
                    tooltip: {
                        start: '点击地图放置圆点标记'
                    }
                },
                marker: {
                    tooltip: {
                        start: '点击地图放置标记'
                    }
                },
                polygon: {
                    tooltip: {
                        start: '点击开始绘制多边形',
                        cont: '点击继续绘制多边形',
                        end: '点击第一个点完成绘制'
                    }
                },
                polyline: {
                    error: '<strong>错误:</strong> 多边形边不能相交!',
                    tooltip: {
                        start: '点击开始绘制折线',
                        cont: '点击继续绘制折线',
                        end: '点击最后一个点完成绘制'
                    }
                },
                rectangle: {
                    tooltip: {
                        start: '点击并拖动绘制矩形'
                    }
                },
                simpleshape: {
                    tooltip: {
                        end: '释放鼠标完成绘制'
                    }
                }
            }
        },
        edit: {
            toolbar: {
                actions: {
                    save: {
                        title: '保存修改',
                        text: '保存'
                    },
                    cancel: {
                        title: '取消编辑，撤销所有更改',
                        text: '取消'
                    },
                    clearAll: {
                        title: '清除所有绘制图形',
                        text: '清除所有'
                    }
                },
                buttons: {
                    edit: '编辑图形',
                    editDisabled: '没有可编辑的图形',
                    remove: '删除图形',
                    removeDisabled: '没有可删除的图形'
                }
            },
            handlers: {
                edit: {
                    tooltip: {
                        text: '拖动控制点编辑图形',
                        subtext: '点击取消撤销修改'
                    }
                },
                remove: {
                    tooltip: {
                        text: '点击图形删除'
                    }
                }
            }
        }
    };
</script>

</body>
</html>
